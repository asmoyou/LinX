platform:
  name: LinX Platform
  version: 1.0.0
  environment: development
  debug: true
api:
  host: 0.0.0.0
  port: 8000
  workers: 4
  cors:
    enabled: true
    origins:
    - http://localhost:3000
    - http://localhost:5173
    allow_credentials: true
    allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
    allow_headers:
    - '*'
  rate_limit:
    enabled: true
    requests_per_minute: 300
    requests_per_hour: 1000
    burst: 10
  jwt:
    secret_key: ${JWT_SECRET}
    algorithm: HS256
    expiration_hours: 24
    refresh_expiration_days: 7
  max_request_size_mb: 100
  timeout_seconds: 300
database:
  postgres:
    host: ${POSTGRES_HOST}
    port: 5432
    database: ${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    pool_size: 20
    max_overflow: 10
    pool_timeout: 30
    pool_recycle: 3600
    echo: false
    echo_pool: false
    ssl_mode: prefer
    ssl_cert: null
    ssl_key: null
    ssl_root_cert: null
  milvus:
    host: ${MILVUS_HOST}
    port: 19530
    user: ''
    password: ''
    collection_prefix: workforce_
    index_type: IVF_FLAT
    metric_type: L2
    nlist: 1024
    nprobe: 16
    hnsw_m: 16
    hnsw_ef_construction: 200
    hnsw_ef: 64
    timeout: 30
    enable_partitioning: true
    partition_by: user_id
  redis:
    host: ${REDIS_HOST}
    port: 6379
    password: ${REDIS_PASSWORD}
    db: 0
    max_connections: 50
    socket_timeout: 5
    socket_connect_timeout: 5
    retry_on_timeout: true
    max_retries: 3
    ssl: false
    ssl_cert_reqs: required
    ssl_ca_certs: null
storage:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access_key: ${MINIO_ACCESS_KEY}
    secret_key: ${MINIO_SECRET_KEY}
    secure: false
    region: us-east-1
    buckets:
      documents: documents
      audio: audio
      video: video
      images: images
      artifacts: agent-artifacts
      backups: backups
    max_file_size_mb: 500
    allowed_document_types:
    - pdf
    - doc
    - docx
    - pptx
    - xls
    - xlsx
    - txt
    - md
    - html
    allowed_audio_types:
    - mp3
    - wav
    - m4a
    - flac
    allowed_video_types:
    - mp4
    - avi
    - mov
    - mkv
    allowed_image_types:
    - png
    - jpg
    - jpeg
    - gif
    - bmp
    - webp
    enable_versioning: true
    temp_file_retention_days: 7
    backup_retention_days: 90
llm:
  default_provider: ollama
  enable_fallback: false
  fallback_order:
  - ollama
  - vllm
  timeout_seconds: 120
  max_retries: 3
  retry_delay_seconds: 2
  cache_ttl: 30
  providers:
    ollama:
      enabled: true
      base_url: http://192.168.0.29:11434
      models:
        chat: qwen3-vl:30b
        embedding: bge-m3
    vllm:
      enabled: true
      base_url: http://192.168.0.29:6006
      models:
        chat: Qwen3-Next-80B-A3B-Instruct-AWQ-4bit
agents:
  defaults:
    timeout_seconds: 1800
    compaction_grace_seconds: 60
  pool:
    min_size: 10
    max_size: 100
    idle_timeout_minutes: 5
    warmup_enabled: true
    warmup_count: 5
  resources:
    default_cpu_cores: 1.0
    default_memory_gb: 2
    max_cpu_cores: 4
    max_memory_gb: 8
    default_disk_gb: 10
    max_disk_gb: 50
  templates:
  - name: data_analyst
    display_name: Data Analyst
    description: Analyzes data, creates visualizations, and generates reports
    skills:
    - data_processing
    - statistical_analysis
    - visualization
    - sql_query
    default_cpu: 2.0
    default_memory: 4
  - name: content_writer
    display_name: Content Writer
    description: Creates, edits, and summarizes written content
    skills:
    - writing
    - editing
    - summarization
    - translation
    default_cpu: 1.0
    default_memory: 2
  - name: code_assistant
    display_name: Code Assistant
    description: Writes, debugs, and reviews code
    skills:
    - code_generation
    - debugging
    - code_review
    - testing
    default_cpu: 2.0
    default_memory: 4
  - name: research_assistant
    display_name: Research Assistant
    description: Gathers information, conducts research, and compiles reports
    skills:
    - information_gathering
    - web_search
    - summarization
    - citation
    default_cpu: 1.0
    default_memory: 2
  execution:
    max_task_duration_minutes: 60
    heartbeat_interval_seconds: 30
    max_retries: 3
    retry_delay_seconds: 5
skill_library:
  curated_sync:
    run_on_startup: true
    fail_soft: true
    curated_root: backend/skill_library/curated_skills
code_execution:
  sandbox_mode: auto
  fallback_enabled: true
  fallback_to_docker: true
  warn_on_fallback: true
  require_minimum_security: medium
  platform_overrides:
    linux:
      preferred: gvisor
      fallback:
      - firecracker
      - docker
    darwin:
      preferred: docker
      fallback: []
    windows:
      preferred: docker
      fallback: []
  resources:
    default_cpu_cores: 0.5
    max_cpu_cores: 2.0
    default_memory_mb: 512
    max_memory_mb: 2048
    default_timeout_seconds: 30
    max_timeout_seconds: 300
    max_disk_io_mbps: 10
    max_network_bandwidth_mbps: 1
    max_network_connections: 5
  security:
    enable_network: false
    allowed_domains: []
    block_dangerous_imports: true
    enable_static_analysis: true
    read_only_filesystem: true
  pool:
    enabled: true
    size: 10
    warmup_on_startup: true
security:
  encryption:
    at_rest: true
    in_transit: true
    algorithm: AES-256-GCM
  data_classification:
    enabled: true
    auto_classify: true
    levels:
    - public
    - internal
    - confidential
    - restricted
    default_level: internal
  container_isolation:
    drop_capabilities:
    - NET_RAW
    - SYS_ADMIN
    - SYS_PTRACE
    - SYS_MODULE
    - DAC_OVERRIDE
    read_only_root: true
    no_new_privileges: true
    seccomp_profile: default
    apparmor_profile: docker-default
  network:
    enable_firewall: true
    default_policy: deny
    allowed_internal_ports:
    - 8000
    - 5432
    - 19530
    - 6379
    - 9000
    block_external_access: true
  authentication:
    password_min_length: 12
    password_require_uppercase: true
    password_require_lowercase: true
    password_require_numbers: true
    password_require_special: true
    max_login_attempts: 5
    lockout_duration_minutes: 30
  session:
    max_concurrent_sessions: 5
    idle_timeout_minutes: 30
    absolute_timeout_hours: 24
quotas:
  default:
    max_agents: 10
    max_storage_gb: 100
    max_cpu_cores: 10
    max_memory_gb: 20
    max_concurrent_tasks: 50
    max_knowledge_items: 1000
  admin:
    max_agents: 100
    max_storage_gb: 1000
    max_cpu_cores: 100
    max_memory_gb: 200
    max_concurrent_tasks: 500
    max_knowledge_items: 10000
  enforcement:
    enabled: true
    warn_at_percentage: 80
    block_at_percentage: 100
monitoring:
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
    collect_system_metrics: true
    collect_application_metrics: true
    collect_business_metrics: true
    scrape_interval_seconds: 15
  logging:
    level: INFO
    format: json
    output: stdout
    timezone: Asia/Shanghai
    file:
      path: /var/log/linx-platform
      filename: platform.log
      max_size_mb: 100
      max_files: 10
      rotation: daily
    include_timestamp: true
    include_level: true
    include_caller: true
    include_correlation_id: true
    components:
      api_gateway: INFO
      task_manager: INFO
      agent_framework: INFO
      memory_system: INFO
      llm_providers: WARNING
      database: WARNING
  tracing:
    enabled: true
    provider: jaeger
    jaeger:
      agent_host: localhost
      agent_port: 6831
      collector_endpoint: http://localhost:14268/api/traces
    sample_rate: 0.1
    sample_errors: true
    propagate_context: true
  health:
    enabled: true
    endpoint: /health
    interval_seconds: 30
    timeout_seconds: 5
    check_database: true
    check_redis: true
    check_minio: true
    check_milvus: true
    check_funasr: true
    check_llm: true
alerting:
  enabled: false
  channels:
    email:
      enabled: false
      smtp_host: smtp.gmail.com
      smtp_port: 587
      smtp_user: ''
      smtp_password: ''
      from_address: alerts@company.com
      to_addresses:
      - admin@company.com
      use_tls: true
    slack:
      enabled: false
      webhook_url: ''
      channel: '#workforce-alerts'
      username: Workforce Platform
      icon_emoji: ':robot_face:'
    teams:
      enabled: false
      webhook_url: ''
    pagerduty:
      enabled: false
      integration_key: ''
      severity_threshold: critical
  rules:
    system:
      cpu_threshold: 90
      memory_threshold: 95
      disk_threshold: 85
    application:
      error_rate_threshold: 5
      task_failure_rate_threshold: 10
      api_latency_p99_threshold_ms: 5000
    security:
      failed_auth_attempts_per_minute: 10
      unauthorized_access_attempts: 1
    business:
      task_queue_depth_threshold: 100
      agent_pool_exhausted: true
  routing:
    critical:
    - pagerduty
    - slack
    - email
    high:
    - slack
    - email
    medium:
    - slack
    low:
    - email
  deduplication:
    enabled: true
    window_minutes: 5
  throttling:
    enabled: true
    max_alerts_per_hour: 10
task_management:
  decomposition:
    max_depth: 5
    max_subtasks: 20
    use_llm: true
    llm_model: chat
  execution:
    default_timeout_minutes: 60
    max_timeout_minutes: 480
    enable_parallel: true
    max_parallel_tasks: 10
  retry:
    enabled: true
    max_attempts: 3
    backoff_strategy: exponential
    initial_delay_seconds: 5
    max_delay_seconds: 300
  aggregation:
    default_strategy: concatenation
    use_llm_for_summarization: true
user_memory:
  embedding:
    provider: xinference
    model: bge-m3
    dimension: 1024
    inherit_from_knowledge_base: true
    batch_size: 32
  retrieval:
    hybrid_enabled: true
    similarity_threshold: 0.3
    vector:
      candidate_top_k: 40
      collection_prefix: user_memory_embeddings_v2
      metric_type: IP
      nprobe: 16
    lexical:
      enabled: true
      top_k: 30
      fts_enabled: true
      trigram_enabled: true
    structured:
      enabled: true
      top_k: 20
    fusion:
      method: rrf
      rrf_k: 60
    rerank:
      enabled: true
      provider: xinference
      model: bge-reranker-v2-m3
      top_k: 30
      weight: 0.75
      timeout_seconds: 8
      failure_backoff_seconds: 30
      doc_max_chars: 1200
    planner:
      runtime_mode: light
      api_mode: full
      provider: vllm
      model: Qwen3.5-27B-FP8
      timeout_seconds: 4
      failure_backoff_seconds: 60
      max_query_variants: 3
    reflection:
      enabled_api: true
      max_rounds: 1
      min_results: 3
      min_score: 0.45
  extraction:
    provider: vllm
    model: Qwen3.5-27B-FP8
    timeout_seconds: 120
    max_facts: 10
    max_preference_facts: 10
    enable_heuristic_fallback: true
    secondary_recall_enabled: true
    failure_backoff_seconds: 60
    fail_closed_empty_writes: true
    enabled: true
    model_enabled: true
  conversation_extraction:
    enabled: true
    run_on_startup: true
    startup_delay_seconds: 30
    interval_seconds: 300
    idle_timeout_minutes: 30
    overlap_turns: 2
    max_new_turns_per_run: 8
    max_batches_per_invocation: 3
    advisory_lock_id: 73012024
    use_advisory_lock: true
    run_lease_seconds: 300
    scan_limit: 200
  consolidation:
    enabled: true
    run_on_startup: true
    startup_delay_seconds: 180
    interval_seconds: 21600
    dry_run: false
    limit: 5000
    use_advisory_lock: true
    advisory_lock_id: 73012020
  observability:
    enable_quality_counters: true
  vector_indexing:
    enabled: true
    run_on_startup: true
    startup_delay_seconds: 10
    poll_interval_seconds: 5
    batch_size: 32
    stale_lock_seconds: 900
    max_attempts: 8
    retry_backoff_seconds: 30
  vector_cleanup:
    enabled: true
    run_on_startup: true
    startup_delay_seconds: 300
    interval_seconds: 21600
    dry_run: false
    batch_size: 500
    compact_on_cycle: true
    advisory_lock_id: 73012023
    use_advisory_lock: true
skill_candidates:
  extraction:
    enabled: true
    provider: vllm
    model: Qwen3.5-27B-FP8
    timeout_seconds: 120
    max_candidates: 6
    failure_backoff_seconds: 60
skill_runtime:
  retrieval:
    enabled: true
    top_k: 5
    min_similarity: 0.45
  auto_bind_source_agent: true
session_ledger:
  enabled: true
  retention_days: 14
  run_on_startup: true
  startup_delay_seconds: 120
  cleanup_interval_seconds: 21600
  batch_size: 1000
  dry_run: false
  use_advisory_lock: true
  advisory_lock_id: 73012021
persistent_conversations:
  runtime:
    ttl_minutes: 30
    cleanup_interval_seconds: 300
    use_sandbox_by_default: true
  workspace:
    decay_enabled: true
    ephemeral_ttl_hours: 6
    rebuildable_ttl_hours: 24
    soft_limit_mb: 500
    hard_limit_mb: 1024
    soft_limit_files: 5000
    hard_limit_files: 10000
  history:
    compaction_enabled: true
    recent_turn_window: 40
    min_message_age_hours: 24
  lifecycle:
    enabled: true
    run_on_startup: true
    startup_delay_seconds: 30
    interval_seconds: 300
    archive_after_days: 30
    delete_after_days: 90
    dry_run: false
    scan_limit: 200
    use_advisory_lock: true
    advisory_lock_id: 73012025
runtime_context:
  enable_user_memory: true
  enable_skills: true
  enable_knowledge_base: true
integrations:
  feishu:
    long_connection:
      poll_interval_seconds: 5
      proxy_mode: system
      proxy_url: ''
  enable_knowledge_base: true
  collection_retry_attempts: 3
  collection_retry_delay_seconds: 0.35
  search_timeout_seconds: 2
  delete_timeout_seconds: 2
knowledge_base:
  processing:
    chunk_size_tokens: 512
    chunk_overlap_tokens: 50
    ocr:
      enabled: true
      engine: tesseract
      languages:
      - eng
      - chi_sim
      confidence_threshold: 0.7
    transcription:
      enabled: true
      engine: openai_compatible
      model: SenseVoiceSmall
      language: auto
      provider: xinference
      funasr_service_url: http://127.0.0.1:10095
      funasr_service_timeout_seconds: 300
      funasr_service_api_key: ''
    video:
      extract_audio: true
      extract_frames: false
      frame_interval_seconds: 10
    indexing:
      flush_timeout_seconds: 8
      milvus_max_retries: 2
      retry_backoff_seconds: 1
      allow_flush_degrade: true
  chunking:
    strategy: semantic
    chunk_token_num: 512
    overlap_percent: 10
    delimiters: '

      。；！？.!?'
  parsing:
    method: auto
    vision_model: Qwen3.5-27B-FP8
    vision_provider: vllm
    vision_timeout_seconds: 120
    output_language: zh-CN
  embedding:
    provider: xinference
    model: bge-m3
    dimension: 1024
  enrichment:
    enabled: false
    provider: ollama
    model: qwen3-vl:30b
    keywords_topn: 5
    questions_topn: 3
    generate_summary: true
    temperature: 0.2
    batch_size: 5
    max_tokens: 0
  queue:
    max_concurrent_jobs: 5
    job_timeout_minutes: 60
    retry_failed_jobs: true
    max_retries: 3
  search:
    max_concurrent_requests: 4
    request_timeout_seconds: 30
    enable_semantic: true
    enable_fulltext: true
    combine_results: true
    semantic_weight: 0.7
    fulltext_weight: 0.3
    fusion_method: rrf
    rrf_k: 60
    min_relevance_score: 0.3
    hybrid_score_scale: 0.02
    keyword_min_rank: 4
    keyword_max_terms: 16
    semantic_timeout_seconds: 8
    embedding_failure_backoff_seconds: 30
    rerank_enabled: true
    rerank_weight: 0.85
    rerank_provider: xinference
    rerank_model: bge-reranker-v2-m3
    rerank_top_k: 30
    rerank_timeout_seconds: 10
    rerank_failure_backoff_seconds: 60
    rerank_doc_max_chars: 1600
    cross_language_expansion_enabled: true
    cross_language_languages:
    - en
    - zh-CN
    cross_language_provider: vllm
    cross_language_model: Qwen3.5-35B-A3B-FP8
    cross_language_timeout_seconds: 4
    cross_language_failure_backoff_seconds: 60
    cross_language_max_expansions: 2
    cross_language_max_queries: 3
  cleanup:
    enabled: true
    run_on_startup: true
    startup_delay_seconds: 300
    interval_seconds: 21600
    dry_run: false
    batch_size: 500
    compact_on_cycle: true
    purge_minio_versions: true
    advisory_lock_id: 73012022
    use_advisory_lock: true
message_bus:
  enable_pubsub: true
  enable_streams: true
  enable_queues: true
  retention:
    pubsub_ttl_seconds: 3600
    stream_max_length: 10000
    stream_ttl_days: 7
  consumer_groups:
    enabled: true
    max_consumers_per_group: 10
  serialization: json
  audit_messages: true
deployment:
  mode: docker-compose
  docker_compose:
    project_name: linx-platform
    network_name: workforce-network
  kubernetes:
    namespace: linx-platform
    enable_autoscaling: true
    min_replicas: 2
    max_replicas: 10
    target_cpu_utilization: 70
    use_gvisor: true
    runtime_class: gvisor
  backup:
    enabled: true
    schedule: 0 2 * * *
    retention_days: 30
    backup_location: backups
    backup_postgres: true
    backup_milvus: true
    backup_minio: true
    backup_redis: false
features:
  enable_task_flow_visualization: true
  enable_real_time_updates: true
  enable_websocket: true
  enable_dynamic_skill_generation: false
  enable_robot_integration: false
  enable_multi_tenancy: false
  enable_advanced_analytics: false
  enable_cost_tracking: false
  enable_anomaly_detection: false
development:
  debug_mode: true
  verbose_logging: true
  enable_profiling: false
  hot_reload: true
  watch_files: true
  enable_test_mode: false
  mock_llm_responses: false
  mock_external_services: false
  load_sample_data: false
  sample_users: 5
  sample_agents: 10
  sample_tasks: 20
mcp:
  enabled: true
  connection_timeout: 30
  tool_call_timeout: 60
  max_retries: 3

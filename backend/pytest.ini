[pytest]
# Pytest configuration for LinX (灵枢)

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Command line options
addopts =
    # Verbose output
    -v
    # Import test modules via importlib to avoid basename collisions
    --import-mode=importlib
    # Show summary of all test outcomes
    -ra
    # Strict markers
    --strict-markers
    # Coverage
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    # Show local variables in tracebacks
    --showlocals
    # Disable warnings summary
    --disable-warnings
    # Parallel execution (optional, uncomment to enable)
    # -n auto

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    api: API tests
    database: Database tests
    llm: LLM integration tests
    security: Security tests
    performance: Performance tests

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*
    */.venv/*
    */setup.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov

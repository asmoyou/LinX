version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dwp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-digital_workforce}
      POSTGRES_USER: ${POSTGRES_USER:-dwp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dwp_password_change_me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dwp_user} -d ${POSTGRES_DB:-digital_workforce}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dwp-backend
      - dwp-data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dwp-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dwp-backend
      - dwp-data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: dwp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_URL:-http://localhost:9001}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - dwp-backend
      - dwp-data
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: dwp-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - dwp-data
    restart: unless-stopped

  minio-milvus:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: dwp-minio-milvus
    environment:
      MINIO_ACCESS_KEY: ${MILVUS_MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MILVUS_MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio-milvus-data:/minio_data
    command: minio server /minio_data --console-address ":9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - dwp-data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: dwp-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio-milvus:9000
      MINIO_ACCESS_KEY_ID: ${MILVUS_MINIO_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MILVUS_MINIO_PASSWORD:-minioadmin}
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio-milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 30s
    networks:
      - dwp-backend
      - dwp-data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  minio-milvus-data:
  milvus-data:
  etcd-data:

networks:
  dwp-frontend:
    driver: bridge
  dwp-backend:
    driver: bridge
  dwp-data:
    driver: bridge
    internal: true
  dwp-agents:
    driver: bridge

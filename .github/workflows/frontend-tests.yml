name: Frontend Tests

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  workflow_dispatch:  # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: ['20.x']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run linting (non-blocking)
      working-directory: ./frontend
      continue-on-error: true
      run: npm run lint || echo "Linting issues found"
    
    - name: Run type checking (non-blocking)
      working-directory: ./frontend
      continue-on-error: true
      run: npm run type-check || npx tsc --noEmit || echo "Type checking issues found"
    
    - name: Run tests (non-blocking)
      working-directory: ./frontend
      continue-on-error: true
      run: npm test -- --run --coverage || echo "No tests configured yet"
    
    - name: Build application
      working-directory: ./frontend
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build-${{ matrix.node-version }}
        path: frontend/dist/
        retention-days: 7

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Check code formatting (non-blocking)
      working-directory: ./frontend
      continue-on-error: true
      run: |
        npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" || echo "Formatting issues found - run 'npm run format' to fix"

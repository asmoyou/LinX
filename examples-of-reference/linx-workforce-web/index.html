
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinX 灵枢 | Digital Workforce Orchestration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              apple: {
                blue: '#0071e3',
                green: '#34c759',
                gray: '#86868b',
                bg: {
                  light: '#fbfbfd',
                  dark: '#000000'
                }
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --bg-primary: #fbfbfd;
            --bg-secondary: rgba(255, 255, 255, 0.72);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #10b981;
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04);
        }

        .dark {
            --bg-primary: #000000;
            --bg-secondary: rgba(28, 28, 30, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-primary);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-feature-settings: "cv11", "ss01";
        }

        .glass-panel { 
            background: var(--bg-secondary); 
            backdrop-filter: saturate(180%) blur(20px); 
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--border-subtle); 
            box-shadow: var(--panel-shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(120, 120, 128, 0.2); 
            border-radius: 10px; 
        }

        @keyframes scan { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }
        .scan-line { 
            background: linear-gradient(to bottom, transparent, rgba(16, 185, 129, 0.02), transparent); 
            background-size: 100% 200px; 
            animation: scan 12s linear infinite; 
            pointer-events: none;
        }

        /* Apple-style typography smoothing */
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>

# Prometheus Configuration for Digital Workforce Platform
# 
# References:
# - Requirements 11: Monitoring and Observability
# - Design Section 11: Monitoring and Observability Design
# - Task 5.4: Monitoring and Metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'digital-workforce'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway metrics
  - job_name: 'api-gateway'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api-gateway:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-gateway'

  # Task Manager metrics
  - job_name: 'task-manager'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['task-manager:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'task-manager'

  # Agent Runtime metrics
  - job_name: 'agent-runtime'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['agent-runtime:8002']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'agent-runtime'

  # Document Processor metrics
  - job_name: 'document-processor'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['document-processor:8003']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'document-processor'

  # PostgreSQL metrics (using postgres_exporter)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgresql'

  # Redis metrics (using redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # Milvus metrics
  - job_name: 'milvus'
    static_configs:
      - targets: ['milvus:9091']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'milvus'

  # MinIO metrics
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # Node Exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'host-system'

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'containers'

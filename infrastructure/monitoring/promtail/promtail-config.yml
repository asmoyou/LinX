# Promtail Configuration for Log Collection
#
# Promtail collects logs and sends them to Loki
#
# References:
# - Requirements 11: Monitoring and Observability
# - Design Section 11.2: Logging Strategy
# - Task 5.5.3: Add log aggregation (ELK or Loki)

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # API Gateway logs
  - job_name: api-gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-gateway
          service: digital-workforce
          component: api-gateway
          __path__: /var/log/workforce-platform/api-gateway*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            component: component
            message: message
            correlation_id: correlation_id
            user_id: user_id
            agent_id: agent_id
            task_id: task_id
      - labels:
          level:
          component:
          correlation_id:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Task Manager logs
  - job_name: task-manager
    static_configs:
      - targets:
          - localhost
        labels:
          job: task-manager
          service: digital-workforce
          component: task-manager
          __path__: /var/log/workforce-platform/task-manager*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            component: component
            message: message
            correlation_id: correlation_id
            task_id: task_id
      - labels:
          level:
          component:
          correlation_id:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Agent Runtime logs
  - job_name: agent-runtime
    static_configs:
      - targets:
          - localhost
        labels:
          job: agent-runtime
          service: digital-workforce
          component: agent-runtime
          __path__: /var/log/workforce-platform/agent-runtime*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            component: component
            message: message
            correlation_id: correlation_id
            agent_id: agent_id
      - labels:
          level:
          component:
          correlation_id:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Document Processor logs
  - job_name: document-processor
    static_configs:
      - targets:
          - localhost
        labels:
          job: document-processor
          service: digital-workforce
          component: document-processor
          __path__: /var/log/workforce-platform/document-processor*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            component: component
            message: message
            correlation_id: correlation_id
      - labels:
          level:
          component:
          correlation_id:
      - timestamp:
          source: timestamp
          format: RFC3339

  # System logs (syslog)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          service: digital-workforce
          component: system
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\S+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<process>\S+):\s+(?P<message>.*)$'
      - labels:
          hostname:
          process:
      - timestamp:
          source: timestamp
          format: Jan _2 15:04:05

  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

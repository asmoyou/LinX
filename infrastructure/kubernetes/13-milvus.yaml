apiVersion: v1
kind: Service
metadata:
  name: etcd-service
  namespace: digital-workforce
spec:
  selector:
    app: etcd
  ports:
    - port: 2379
      targetPort: 2379
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: digital-workforce
spec:
  serviceName: etcd-service
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
      - name: etcd
        image: quay.io/coreos/etcd:v3.5.5
        command:
        - etcd
        - -advertise-client-urls=http://0.0.0.0:2379
        - -listen-client-urls=http://0.0.0.0:2379
        - --data-dir=/etcd
        ports:
        - containerPort: 2379
          name: client
        volumeMounts:
        - name: etcd-storage
          mountPath: /etcd
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: etcd-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio-milvus-service
  namespace: digital-workforce
spec:
  selector:
    app: minio-milvus
  ports:
    - port: 9000
      targetPort: 9000
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio-milvus
  namespace: digital-workforce
spec:
  serviceName: minio-milvus-service
  replicas: 1
  selector:
    matchLabels:
      app: minio-milvus
  template:
    metadata:
      labels:
        app: minio-milvus
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2023-03-20T20-16-18Z
        command:
        - minio
        - server
        - /minio_data
        - --console-address
        - ":9002"
        ports:
        - containerPort: 9000
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: dwp-secrets
              key: MILVUS_MINIO_USER
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dwp-secrets
              key: MILVUS_MINIO_PASSWORD
        volumeMounts:
        - name: minio-milvus-storage
          mountPath: /minio_data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: minio-milvus-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-service
  namespace: digital-workforce
spec:
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: metrics
      port: 9091
      targetPort: 9091
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: milvus
  namespace: digital-workforce
spec:
  serviceName: milvus-service
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
      - name: milvus
        image: milvusdb/milvus:v2.3.3
        command:
        - milvus
        - run
        - standalone
        ports:
        - containerPort: 19530
          name: grpc
        - containerPort: 9091
          name: metrics
        env:
        - name: ETCD_ENDPOINTS
          value: "etcd-service:2379"
        - name: MINIO_ADDRESS
          value: "minio-milvus-service:9000"
        - name: MINIO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: dwp-secrets
              key: MILVUS_MINIO_USER
        - name: MINIO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: dwp-secrets
              key: MILVUS_MINIO_PASSWORD
        volumeMounts:
        - name: milvus-storage
          mountPath: /var/lib/milvus
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9091
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9091
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: milvus-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 50Gi

apiVersion: v1
kind: Secret
metadata:
  name: dwp-secrets
  namespace: digital-workforce
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis Credentials
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # MinIO Credentials
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Milvus MinIO Credentials
  MILVUS_MINIO_USER: "minioadmin"
  MILVUS_MINIO_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Secret
  JWT_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_STRING"
  
  # LLM Provider API Keys (Optional)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  
  # SMTP Configuration (Optional)
  SMTP_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: digital-workforce
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Generate with: kubectl create secret tls tls-secret --cert=path/to/tls.crt --key=path/to/tls.key -n digital-workforce --dry-run=client -o yaml
  tls.crt: LS0tLS1CRUdJTi...  # Replace with actual certificate
  tls.key: LS0tLS1CRUdJTi...  # Replace with actual key
